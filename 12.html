<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة معمارية الإيمان - 23 سؤال</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0f0d;
            --bg2: #111a16;
            --card: #162019;
            --card2: #1c2a22;
            --fg: #ece6d4;
            --muted: #7d9083;
            --accent: #c9952e;
            --accent2: #e8b84a;
            --accent-dim: rgba(201,149,46,0.12);
            --accent-glow: rgba(201,149,46,0.25);
            --teal: #1fa87a;
            --teal-dim: rgba(31,168,122,0.12);
            --teal-glow: rgba(31,168,122,0.25);
            --ok: #2ecc71;
            --ok-dim: rgba(46,204,113,0.12);
            --no: #e04848;
            --no-dim: rgba(224,72,72,0.12);
            --border: rgba(201,149,46,0.1);
            --border2: rgba(201,149,46,0.22);
            --shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        *{margin:0;padding:0;box-sizing:border-box}

        body{
            font-family:'Tajawal',sans-serif;
            background:var(--bg);color:var(--fg);
            min-height:100vh;overflow-x:hidden;
        }

        /* ===== خلفية ===== */
        .bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}

        .bg-scene .geo{
            position:absolute;
            border:1px solid rgba(201,149,46,0.04);
            animation:geoSpin var(--sp) linear infinite;
        }
        .bg-scene .geo-1{width:600px;height:600px;border-radius:50%;top:-200px;left:-200px;--sp:60s}
        .bg-scene .geo-2{width:400px;height:400px;top:50%;right:-150px;--sp:45s;animation-direction:reverse}
        .bg-scene .geo-3{width:300px;height:300px;bottom:-100px;left:30%;--sp:50s;border-color:rgba(31,168,122,0.04)}

        @keyframes geoSpin{to{transform:rotate(360deg)}}

        .bg-scene .glow{
            position:absolute;border-radius:50%;filter:blur(120px);opacity:.35;
        }
        .bg-scene .glow-1{
            width:500px;height:500px;
            background:radial-gradient(circle,var(--accent-glow),transparent 70%);
            top:-180px;right:-120px;
            animation:gFloat 16s ease-in-out infinite;
        }
        .bg-scene .glow-2{
            width:420px;height:420px;
            background:radial-gradient(circle,var(--teal-glow),transparent 70%);
            bottom:-140px;left:-100px;
            animation:gFloat 20s ease-in-out infinite reverse;
        }
        @keyframes gFloat{
            0%,100%{transform:translate(0,0) scale(1)}
            33%{transform:translate(35px,-30px) scale(1.06)}
            66%{transform:translate(-20px,20px) scale(.95)}
        }

        /* نجوم */
        .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
        .st{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;animation:twk var(--d) ease-in-out infinite;opacity:0}
        @keyframes twk{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--o);transform:scale(1.3)}}

        /* شبكة */
        .grid-ov{
            position:fixed;inset:0;z-index:0;pointer-events:none;
            background-image:linear-gradient(rgba(201,149,46,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(201,149,46,.02) 1px,transparent 1px);
            background-size:70px 70px;
        }

        /* ===== الحاوية ===== */
        .wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:20px 16px 60px}

        /* ===== البداية ===== */
        .intro{
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            min-height:90vh;text-align:center;animation:upIn .7s ease-out;
        }
        @keyframes upIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

        .intro-arch{
            position:relative;width:140px;height:140px;margin-bottom:36px;
        }
        .intro-arch .ring{
            position:absolute;inset:0;border-radius:50%;
            border:2px solid var(--accent);opacity:.2;
            animation:ringPulse 4s ease-in-out infinite;
        }
        .intro-arch .ring:nth-child(2){inset:12px;animation-delay:.5s;border-color:var(--teal);opacity:.25}
        .intro-arch .ring:nth-child(3){inset:24px;animation-delay:1s}
        @keyframes ringPulse{0%,100%{transform:scale(1);opacity:.15}50%{transform:scale(1.08);opacity:.35}}
        .intro-arch .core{
            position:absolute;inset:36px;border-radius:50%;
            background:conic-gradient(from 0deg,var(--accent),var(--teal),var(--accent));
            display:flex;align-items:center;justify-content:center;
            animation:coreSpin 10s linear infinite;
        }
        .intro-arch .core::before{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--bg)}
        .intro-arch .core i{position:relative;z-index:1;font-size:40px;color:var(--accent2);animation:coreSpin 10s linear infinite reverse}
        @keyframes coreSpin{to{transform:rotate(360deg)}}

        .intro h1{
            font-family:'Amiri',serif;font-size:clamp(2rem,5vw,3.4rem);
            font-weight:700;color:var(--accent2);margin-bottom:8px;line-height:1.3;
        }
        .intro .tagline{color:var(--muted);font-size:1.05rem;max-width:520px;line-height:1.85;margin-bottom:12px}
        .intro .topics{
            display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:32px;
        }
        .intro .tp{
            background:var(--card);border:1px solid var(--border);border-radius:20px;
            padding:6px 16px;font-size:.82rem;color:var(--teal);font-weight:700;
        }

        .intro-stats{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:40px}
        .is-box{
            background:var(--card);border:1px solid var(--border);border-radius:14px;
            padding:14px 22px;text-align:center;transition:transform .3s,border-color .3s;
        }
        .is-box:hover{transform:translateY(-3px);border-color:var(--border2)}
        .is-box .n{font-size:1.7rem;font-weight:900;color:var(--accent2);display:block}
        .is-box .l{font-size:.78rem;color:var(--muted);margin-top:2px}

        .btn-go{
            background:linear-gradient(135deg,var(--accent),#a67a1e);color:var(--bg);
            font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:900;
            padding:17px 58px;border:none;border-radius:60px;cursor:pointer;
            box-shadow:0 4px 30px var(--accent-glow);transition:all .3s;position:relative;overflow:hidden;
        }
        .btn-go::after{
            content:'';position:absolute;inset:0;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
            transform:translateX(-100%);transition:transform .6s;
        }
        .btn-go:hover::after{transform:translateX(100%)}
        .btn-go:hover{transform:translateY(-3px);box-shadow:0 8px 50px var(--accent-glow)}
        .btn-go:active{transform:translateY(0)}

        /* ===== شريط التقدم ===== */
        .topbar{
            position:sticky;top:0;z-index:20;
            background:rgba(10,15,13,.93);backdrop-filter:blur(16px);
            padding:14px 0 10px;margin-bottom:20px;border-bottom:1px solid var(--border);
        }
        .topbar-in{
            display:flex;justify-content:space-between;align-items:center;
            margin-bottom:8px;font-size:.86rem;color:var(--muted);
        }
        .topbar-in .qn{color:var(--accent2);font-weight:900;font-size:1rem}
        .sc-live{display:flex;align-items:center;gap:5px;color:var(--ok);font-weight:900;font-size:.95rem}
        .tmr{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:.86rem;font-variant-numeric:tabular-nums}
        .tmr.warn{color:var(--no);animation:tmrBlink .5s ease-in-out infinite alternate}
        @keyframes tmrBlink{to{opacity:.5}}
        .bar-tr{width:100%;height:5px;background:rgba(255,255,255,.04);border-radius:10px;overflow:hidden}
        .bar-fl{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--teal),var(--accent2));transition:width .5s cubic-bezier(.22,1,.36,1);width:0%}

        /* ===== بطاقة السؤال ===== */
        .qc{
            background:var(--card);border:1px solid var(--border);border-radius:22px;
            padding:28px 24px;box-shadow:var(--shadow);animation:upIn .4s ease-out;
        }
        .qc.shake{animation:shake .4s ease}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

        .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:18px;font-size:.82rem;flex-wrap:wrap}
        .q-cat{
            display:flex;align-items:center;gap:6px;
            background:var(--accent-dim);color:var(--accent2);
            padding:5px 14px;border-radius:20px;font-weight:700;
        }
        .q-sec{
            background:var(--teal-dim);color:var(--teal);
            padding:5px 14px;border-radius:20px;font-weight:700;font-size:.78rem;
        }
        .q-diff{display:flex;gap:3px;margin-right:auto}
        .q-diff .dd{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.08);transition:background .3s}
        .q-diff .dd.on{background:var(--accent2)}

        .q-txt{
            font-family:'Amiri',serif;font-size:clamp(1.1rem,2.4vw,1.35rem);
            line-height:2;color:var(--fg);margin-bottom:24px;font-weight:700;
        }

        /* ===== الخيارات ===== */
        .opts{display:flex;flex-direction:column;gap:10px}
        .op{
            display:flex;align-items:center;gap:14px;width:100%;
            padding:14px 18px;background:rgba(255,255,255,.02);
            border:2px solid rgba(255,255,255,.05);border-radius:14px;
            color:var(--fg);font-family:'Tajawal',sans-serif;font-size:1.02rem;
            cursor:pointer;transition:all .25s;text-align:right;
        }
        .op:hover:not(.lk){
            border-color:var(--accent2);background:var(--accent-dim);transform:translateX(-5px);
        }
        .op .ol{
            width:34px;height:34px;min-width:34px;border-radius:9px;
            background:rgba(255,255,255,.04);display:flex;align-items:center;
            justify-content:center;font-weight:900;font-size:.9rem;color:var(--muted);transition:all .25s;
        }
        .op:hover:not(.lk) .ol{background:var(--accent2);color:var(--bg)}
        .op.y{border-color:var(--ok);background:var(--ok-dim)}
        .op.y .ol{background:var(--ok);color:#fff}
        .op.n{border-color:var(--no);background:var(--no-dim)}
        .op.n .ol{background:var(--no);color:#fff}
        .op.lk{cursor:default;opacity:.45}
        .op.y.lk,.op.n.lk{opacity:1}

        /* ===== التفسير ===== */
        .exp{
            margin-top:18px;padding:16px 18px;border-radius:12px;
            font-size:.92rem;line-height:1.85;display:none;animation:upIn .35s ease-out;
        }
        .exp.sh{display:block}
        .exp.eok{background:var(--ok-dim);border:1px solid rgba(46,204,113,.25);color:#8fd8af}
        .exp.eno{background:var(--no-dim);border:1px solid rgba(224,72,72,.25);color:#f0a0a0}
        .exp i{margin-left:8px}

        /* ===== زر التالي ===== */
        .nxt-w{display:none;justify-content:center;margin-top:24px;animation:upIn .4s ease-out .12s both}
        .nxt-w.sh{display:flex}
        .btn-nxt{
            background:transparent;color:var(--accent2);font-family:'Tajawal',sans-serif;
            font-size:1.05rem;font-weight:700;padding:13px 42px;
            border:2px solid var(--accent2);border-radius:50px;cursor:pointer;transition:all .3s;
        }
        .btn-nxt:hover{background:var(--accent2);color:var(--bg);transform:translateY(-2px);box-shadow:0 4px 24px var(--accent-glow)}

        /* ===== نقاط منبثقة ===== */
        .ppop{
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            z-index:50;font-size:3.2rem;font-weight:900;pointer-events:none;
            animation:ppA .8s ease-out forwards;
        }
        @keyframes ppA{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-70%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-100%) scale(.8)}}

        /* ===== النتائج ===== */
        .res{
            display:none;flex-direction:column;align-items:center;text-align:center;
            padding-top:36px;animation:upIn .7s ease-out;
        }
        .res.sh{display:flex}

        .res-circ{width:190px;height:190px;position:relative;margin-bottom:30px}
        .res-circ svg{width:100%;height:100%;transform:rotate(-90deg)}
        .res-circ .tk{fill:none;stroke:rgba(255,255,255,.04);stroke-width:8}
        .res-circ .fl{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:502;stroke-dashoffset:502;transition:stroke-dashoffset 1.6s cubic-bezier(.22,1,.36,1)}
        .res-circ .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .res-circ .pct .big{font-size:3rem;font-weight:900;line-height:1}
        .res-circ .pct .sm{font-size:.82rem;color:var(--muted);margin-top:4px}

        .res-t{font-family:'Amiri',serif;font-size:clamp(1.6rem,4vw,2.5rem);font-weight:700;margin-bottom:10px}
        .res-d{color:var(--muted);font-size:1.05rem;line-height:1.85;max-width:500px;margin-bottom:34px}

        .res-stats{display:flex;gap:14px;margin-bottom:34px;flex-wrap:wrap;justify-content:center}
        .rs{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 24px;min-width:100px}
        .rs .rn{font-size:1.4rem;font-weight:900}
        .rs .rl{font-size:.76rem;color:var(--muted);margin-top:2px}
        .rs.sg .rn{color:var(--ok)}.rs.sr .rn{color:var(--no)}.rs.sa .rn{color:var(--accent2)}.rs.st .rn{color:#8ecae6}

        /* تحليل الأقسام */
        .sec-analysis{width:100%;margin-bottom:34px}
        .sec-analysis h3{font-family:'Amiri',serif;font-size:1.15rem;color:var(--accent2);margin-bottom:14px;text-align:right}
        .sa-row{
            display:flex;align-items:center;gap:12px;margin-bottom:10px;
            background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;
        }
        .sa-row .sa-name{min-width:140px;font-size:.88rem;font-weight:700;text-align:right;color:var(--fg)}
        .sa-row .sa-bar{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden}
        .sa-row .sa-bar .sa-fill{height:100%;border-radius:10px;transition:width 1s ease .5s}
        .sa-row .sa-pct{min-width:40px;font-size:.85rem;font-weight:900;text-align:left}

        /* مراجعة */
        .rv-btn{
            background:none;border:1px solid var(--border);color:var(--muted);
            font-family:'Tajawal',sans-serif;font-size:1rem;padding:11px 26px;
            border-radius:50px;cursor:pointer;transition:all .3s;
        }
        .rv-btn:hover{border-color:var(--accent2);color:var(--accent2)}
        .rv-list{display:none;margin-top:18px;flex-direction:column;gap:12px;width:100%}
        .rv-list.sh{display:flex}
        .rv-i{
            background:var(--card);border:1px solid var(--border);border-radius:14px;
            padding:16px;display:flex;gap:12px;align-items:flex-start;text-align:right;
        }
        .rv-i .ri-ic{width:32px;height:32px;min-width:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
        .rv-i.rc .ri-ic{background:var(--ok-dim);color:var(--ok)}
        .rv-i.rw .ri-ic{background:var(--no-dim);color:var(--no)}
        .rv-i .ri-b{flex:1}
        .rv-i .ri-q{font-weight:700;margin-bottom:4px;line-height:1.6;font-size:.92rem}
        .rv-i .ri-a{font-size:.83rem;color:var(--muted);line-height:1.7}
        .rv-i .ri-a b{font-weight:700}
        .rv-i.rc .ri-a b{color:var(--ok)}.rv-i.rw .ri-a b{color:var(--no)}

        @media(max-width:640px){
            .wrap{padding:14px 10px 40px}
            .qc{padding:18px 14px;border-radius:16px}
            .op{padding:12px 14px;font-size:.97rem}
            .intro-stats{gap:10px}
            .is-box{padding:10px 16px}
            .res-stats{gap:10px}.rs{padding:10px 16px;min-width:85px}
            .sa-row .sa-name{min-width:100px;font-size:.8rem}
        }

        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>

<div class="bg-scene">
    <div class="geo geo-1"></div><div class="geo geo-2"></div><div class="geo geo-3"></div>
    <div class="glow glow-1"></div><div class="glow glow-2"></div>
</div>
<div class="grid-ov"></div>
<div class="stars" id="starsC"></div>

<div class="wrap">

    <!-- ===== البداية ===== -->
    <section class="intro" id="introScr">
        <div class="intro-arch">
            <div class="ring"></div><div class="ring"></div><div class="ring"></div>
            <div class="core"><i class="fas fa-mosque"></i></div>
        </div>
        <h1>معمارية الإيمان</h1>
        <p class="tagline">اختبر معرفتك بأصول الدين وفروعه والجهاد والصلوات اليومية وعدد ركعاتها في 23 سؤالاً شاملاً</p>
        <div class="topics">
            <span class="tp"><i class="fas fa-seedling" style="margin-left:4px"></i>أصول الدين</span>
            <span class="tp"><i class="fas fa-code-branch" style="margin-left:4px"></i>فروع الدين</span>
            <span class="tp"><i class="fas fa-shield-halved" style="margin-left:4px"></i>الجهاد</span>
            <span class="tp"><i class="fas fa-hands-praying" style="margin-left:4px"></i>الصلوات اليومية</span>
            <span class="tp"><i class="fas fa-list-ol" style="margin-left:4px"></i>عدد الركعات</span>
        </div>
        <div class="intro-stats">
            <div class="is-box"><span class="n">23</span><span class="l">سؤال</span></div>
            <div class="is-box"><span class="n">5</span><span class="l">أقسام</span></div>
            <div class="is-box"><span class="n">230</span><span class="l">درجة كاملة</span></div>
            <div class="is-box"><span class="n">25</span><span class="l">ثانية/سؤال</span></div>
        </div>
        <button class="btn-go" id="btnGo"><i class="fas fa-bolt" style="margin-left:8px"></i>ابدأ المسابقة</button>
    </section>

    <!-- ===== الأسئلة ===== -->
    <section id="quizSec" style="display:none">
        <div class="topbar">
            <div class="topbar-in">
                <span class="qn" id="qNum">السؤال 1 من 23</span>
                <span class="tmr" id="tmrD"><i class="fas fa-clock"></i><span id="tmrT">25</span></span>
                <span class="sc-live"><i class="fas fa-star"></i><span id="scLive">0</span></span>
            </div>
            <div class="bar-tr"><div class="bar-fl" id="barFl"></div></div>
        </div>
        <div id="qCon"></div>
    </section>

    <!-- ===== النتائج ===== -->
    <section class="res" id="resScr">
        <div class="res-circ">
            <svg viewBox="0 0 180 180"><circle class="tk" cx="90" cy="90" r="80"/><circle class="fl" id="resArc" cx="90" cy="90" r="80"/></svg>
            <div class="pct"><span class="big" id="resPct">0%</span><span class="sm">النتيجة</span></div>
        </div>
        <h2 class="res-t" id="resT"></h2>
        <p class="res-d" id="resD"></p>
        <div class="res-stats">
            <div class="rs sg"><div class="rn" id="sOk">0</div><div class="rl">صحيحة</div></div>
            <div class="rs sr"><div class="rn" id="sNo">0</div><div class="rl">خاطئة</div></div>
            <div class="rs sa"><div class="rn" id="sSc">0</div><div class="rl">الدرجة</div></div>
            <div class="rs st"><div class="rn" id="sTm">0</div><div class="rl">الوقت (ث)</div></div>
        </div>
        <div class="sec-analysis" id="secAnalysis"></div>
        <button class="rv-btn" id="rvBtn"><i class="fas fa-list-check" style="margin-left:8px"></i>مراجعة الإجابات</button>
        <div class="rv-list" id="rvList"></div>
        <button class="btn-go" id="btnRe" style="margin-top:14px"><i class="fas fa-redo" style="margin-left:8px"></i>إعادة المسابقة</button>
    </section>
</div>

<script>
// ===== نجوم =====
(function(){const c=document.getElementById('starsC');for(let i=0;i<50;i++){const s=document.createElement('div');s.className='st';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*5}s;--o:${.2+Math.random()*.4};animation-delay:${Math.random()*5}s;`;if(Math.random()>.7){s.style.width='3px';s.style.height='3px'}c.appendChild(s)}})();

// ===== 23 سؤال =====
const QS=[
    // ===== أصول الدين (5 أسئلة) =====
    {sec:"أصول الدين",cat:"أصول الدين",ico:"fa-seedling",diff:1,
     q:"كم عدد أصول الدين عند المسلمين الشيعة الاثني عشرية؟",
     opts:["3 أصول","4 أصول","5 أصول","6 أصول"],c:2,

// ===== الحالة =====
let cur=0,score=0,ans=[],tmr=null,tLeft=25,tTotal=0;
const LTRS=['أ','ب','ج','د'],TPQ=25;

// ===== الأقسام للت ANALYSIS =====
const SECTIONS=[...new Set(QS.map(q=>q.sec))];

// ===== DOM =====
const $i=document.getElementById('introScr'),
      $q=document.getElementById('quizSec'),
      $r=document.getElementById('resScr'),
      $qc=document.getElementById('qCon'),
      $bf=document.getElementById('barFl'),
      $qn=document.getElementById('qNum'),
      $sc=document.getElementById('scLive'),
      $tt=document.getElementById('tmrT'),
      $td=document.getElementById('tmrD');

// ===== المؤقت =====
function startTmr(){
    tLeft=TPQ;$tt.textContent=tLeft;$td.classList.remove('warn');
    clearInterval(tmr);
    tmr=setInterval(()=>{
        tLeft--;tTotal++;$tt.textContent=tLeft;
        if(tLeft<=5)$td.classList.add('warn');
        if(tLeft<=0){clearInterval(tmr);onTimeout()}
    },1000);
}
function stopTmr(){clearInterval(tmr)}
function onTimeout(){
    const q=QS[cur],opts=document.querySelectorAll('.op');
    opts.forEach(o=>o.classList.add('lk'));opts[q.c].classList.add('y');
    ans.push({q:q.q,sel:-1,c:q.c,ok:false,st:'لم يُجب',ct:q.opts[q.c],sec:q.sec});
    showExp(false,q.exp+' (انتهى الوقت)');
    document.getElementById('nxtW').classList.add('sh');
    showPts('+0','var(--no)');
    $qc.querySelector('.qc').classList.add('shake');
}

// ===== عرض السؤال =====
function render(){
    const q=QS[cur];
    $bf.style.width=(cur/QS.length*100)+'%';
    $qn.textContent=`السؤال ${cur+1} من ${QS.length}`;
    $sc.textContent=score;

    let dots='';for(let i=0;i<5;i++)dots+=`<span class="dd ${i<q.diff?'on':''}"></span>`;

    // ترقيم القسم
    const secIdx=SECTIONS.indexOf(q.sec)+1;
    const secCount=QS.filter(x=>x.sec===q.sec).length;
    const secCur=QS.filter((x,i)=>x.sec===q.sec&&i<=cur).length;

    let oH='';q.opts.forEach((o,i)=>{
        oH+=`<button class="op" data-i="${i}" aria-label="${LTRS[i]}: ${o}"><span class="ol">${LTRS[i]}</span><span>${o}</span></button>`;
    });

    $qc.innerHTML=`<div class="qc">
        <div class="q-meta">
            <span class="q-cat"><i class="fas ${q.ico}"></i>${q.cat}</span>
            <span class="q-sec">القسم ${secIdx}/5 &middot; ${secCur}/${secCount}</span>
            <div class="q-diff">${dots}</div>
        </div>
        <p class="q-txt">${q.q}</p>
        <div class="opts">${oH}</div>
        <div class="exp" id="expB"></div>
        <div class="nxt-w" id="nxtW"><button class="btn-nxt" id="nxtB">${cur<QS.length-1?'السؤال التالي':'عرض النتائج'} <i class="fas fa-arrow-left" style="margin-right:8px"></i></button></div>
    </div>`;

    document.querySelectorAll('.op').forEach(b=>b.addEventListener('click',()=>pick(+b.dataset.i)));
    document.getElementById('nxtB').addEventListener('click',next);
    startTmr();
}

function pick(idx){
    stopTmr();
    const q=QS[cur],ok=idx===q.c,opts=document.querySelectorAll('.op');
    opts.forEach(o=>o.classList.add('lk'));opts[q.c].classList.add('y');
    if(!ok){opts[idx].classList.add('n');$qc.querySelector('.qc').classList.add('shake')}
    if(ok){score+=10;$sc.textContent=score;showPts('+10','var(--ok)')}
    else showPts('+0','var(--no)');
    ans.push({q:q.q,sel:idx,c:q.c,ok,st:q.opts[idx],ct:q.opts[q.c],sec:q.sec});
    showExp(ok,q.exp);
    document.getElementById('nxtW').classList.add('sh');
}

function showExp(ok,t){
    const b=document.getElementById('expB');
    b.className=`exp sh ${ok?'eok':'eno'}`;
    b.innerHTML=`<i class="fas ${ok?'fa-check-circle':'fa-times-circle'}"></i>${ok?'أحسنت! ':'للأسف! '}${t}`;
}

function showPts(t,c){
    const p=document.createElement('div');p.className='ppop';p.style.color=c;p.textContent=t;
    document.body.appendChild(p);setTimeout(()=>p.remove(),900);
}

function next(){
    cur++;
    if(cur<QS.length){render();window.scrollTo({top:0,behavior:'smooth'})}
    else showRes();
}

// ===== النتائج =====
function showRes(){
    stopTmr();$q.style.display='none';$r.classList.add('sh');
    const okC=ans.filter(a=>a.ok).length,noC=ans.length-okC;
    const pct=Math.round(score/(QS.length*10)*100);

    document.getElementById('sOk').textContent=okC;
    document.getElementById('sNo').textContent=noC;
    document.getElementById('sSc').textContent=score+'/230';
    document.getElementById('sTm').textContent=tTotal;
    document.getElementById('resPct').textContent=pct+'%';

    const arc=document.getElementById('resArc'),circ=2*Math.PI*80,off=circ-(circ*pct/100);
    let col;if(pct>=80)col='var(--ok)';else if(pct>=50)col='var(--accent2)';else col='var(--no)';
    arc.style.stroke=col;document.getElementById('resPct').style.color=col;
    setTimeout(()=>arc.style.strokeDashoffset=off,200);

    const tE=document.getElementById('resT'),dE=document.getElementById('resD');
    if(pct>=90){tE.textContent='عبقري! إيمانك راسخ';tE.style.color='var(--ok)';dE.textContent='لديك معرفة عميقة بأصول الدين وفروعه والصلوات. هذا المستوى يدل على تمسكك بدينك ومعرفتك الواسعة به.'}
    else if(pct>=70){tE.textContent='ممتاز! معلوماتك جيدة';tE.style.color='var(--accent2)';dE.textContent='أداء رائع يُظهر اهتمامك بالعلوم الدينية. راجع الأسئلة التي أخطأت فيها لتصل إلى الكمال.'}
    else if(pct>=50){tE.textContent='جيد، لكن تحتاج مراجعة';tE.style.color='var(--accent2)';dE.textContent='لديك قاعدة معرفية مقبولة لكنها تحتاج لتعزيز. اقرأ أكثر في أصول الدين وفروعه لتتحسن.'}
    else{tE.textContent='تحتاج لدراسة أكثر';tE.style.color='var(--no)';dE.textContent='لا تقلق، هذه المسابقة تتطلب معرفة دقيقة. ادرس أصول الدين وفروعه والصلوات ثم عد لإثبات نفسك!'}

    buildSecAnalysis();
    buildRev();
}

// ===== تحليل الأقسام =====
function buildSecAnalysis(){
    const el=document.getElementById('secAnalysis');
    let h=`<h3><i class="fas fa-chart-bar" style="margin-left:8px"></i>تحليل الأداء حسب القسم</h3>`;
    const secColors={'أصول الدين':'var(--accent2)','فروع الدين':'var(--teal)','الجهاد':'#e67e22','الصلوات اليومية':'#9b59b6','عدد الركعات':'#3498db'};

    SECTIONS.forEach(s=>{
        const total=QS.filter(q=>q.sec===s).length;
        const correct=ans.filter(a=>a.sec===s&&a.ok).length;
        const p=Math.round(correct/total*100);
        const c=secColors[s]||'var(--accent2)';
        h+=`<div class="sa-row">
            <span class="sa-name">${s}</span>
            <div class="sa-bar"><div class="sa-fill" style="width:0%;background:${c}" data-w="${p}%"></div></div>
            <span class="sa-pct" style="color:${c}">${p}%</span>
        </div>`;
    });
    el.innerHTML=h;

    // تحريك الأشرطة
    setTimeout(()=>{
        el.querySelectorAll('.sa-fill').forEach(f=>{f.style.width=f.dataset.w});
    },100);
}

// ===== المراجعة =====
function buildRev(){
    const l=document.getElementById('rvList');l.innerHTML='';
    ans.forEach((a,i)=>{
        const e=document.createElement('div');e.className=`rv-i ${a.ok?'rc':'rw'}`;
        e.innerHTML=`<div class="ri-ic"><i class="fas ${a.ok?'fa-check':'fa-xmark'}"></i></div>
        <div class="ri-b"><div class="ri-q">${i+1}. ${a.q}</div>
        <div class="ri-a">إجابتك: <b>${a.st}</b>${!a.ok?`<br>الصحيحة: <b style="color:var(--ok)!important">${a.ct}</b>`:''}</div></div>`;
        l.appendChild(e);
    });
}

document.getElementById('rvBtn').addEventListener('click',()=>{
    const l=document.getElementById('rvList');l.classList.toggle('sh');
    document.getElementById('rvBtn').innerHTML=l.classList.contains('sh')
        ?'<i class="fas fa-chevron-up" style="margin-left:8px"></i>إخفاء المراجعة'
        :'<i class="fas fa-list-check" style="margin-left:8px"></i>مراجعة الإجابات';
});

// ===== بدء =====
document.getElementById('btnGo').addEventListener('click',()=>{
    $i.style.display='none';$q.style.display='block';
    cur=0;score=0;ans=[];tTotal=0;render();
});

// ===== إعادة =====
document.getElementById('btnRe').addEventListener('click',()=>{
    $r.classList.remove('sh');
    document.getElementById('rvList').classList.remove('sh');
    document.getElementById('rvBtn').innerHTML='<i class="fas fa-list-check" style="margin-left:8px"></i>مراجعة الإجابات';
    document.getElementById('resArc').style.strokeDashoffset=502;
    $q.style.display='block';cur=0;score=0;ans=[];tTotal=0;render();
    window.scrollTo({top:0,behavior:'smooth'});
});

// ===== لوحة المفاتيح =====
document.addEventListener('keydown',e=>{
    if($q.style.display==='none')return;
    const m={'1':0,'2':1,'3':2,'4':3};const idx=m[e.key];
    if(idx!==undefined){const b=document.querySelectorAll('.op:not(.lk)');if(b[idx])b[idx].click()}
    if(e.key==='Enter'){const w=document.getElementById('nxtW');if(w&&w.classList.contains('sh'))document.getElementById('nxtB').click()}
});
</script>
