<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معمارية الإيمان - نظام البطاقات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #080c0a;
            --card-bg: #121a15;
            --accent: #c9952e;
            --accent-glow: rgba(201,149,46,0.3);
            --teal: #1fa87a;
            --fg: #ece6d4;
            --muted: #7d9083;
            --ok: #2ecc71;
            --no: #e04848;
            --border: rgba(201,149,46,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
            direction: rtl;
        }

        /* خلفية جمالية */
        .bg-decor {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at top right, var(--accent-glow), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(31,168,122,0.1), transparent 40%);
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* شاشة البداية */
        .intro {
            text-align: center; padding: 60px 20px; animation: fadeIn 0.8s ease-out;
        }
        .intro h1 { font-family: 'Amiri', serif; font-size: 3.5rem; color: var(--accent); margin-bottom: 20px; }
        .intro p { font-size: 1.2rem; color: var(--muted); margin-bottom: 40px; max-width: 600px; margin-inline: auto; }

        /* لوحة البطاقات */
        .board-container { display: none; animation: fadeIn 0.5s ease; }
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 15px 25px; border-radius: 15px;
            margin-bottom: 30px; border: 1px solid var(--border);
        }
        .stat-item { font-weight: 900; font-size: 1.1rem; }
        .stat-item span { color: var(--accent); margin-right: 8px; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px; margin-bottom: 40px;
        }

        .q-card {
            aspect-ratio: 1/1; background: var(--card-bg);
            border: 2px solid var(--border); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .q-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 5px 15px var(--accent-glow); }
        .q-card i { font-size: 1.5rem; margin-bottom: 8px; color: var(--muted); }
        .q-card span { font-weight: 900; font-size: 1.2rem; }

        /* حالات البطاقة */
        .q-card.done-ok { border-color: var(--ok); background: rgba(46, 204, 113, 0.05); }
        .q-card.done-ok i, .q-card.done-ok span { color: var(--ok); }
        .q-card.done-no { border-color: var(--no); background: rgba(224, 72, 72, 0.05); }
        .q-card.done-no i, .q-card.done-no span { color: var(--no); }
        .q-card.disabled { pointer-events: none; opacity: 0.8; }

        /* المودال (نافذة السؤال) */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px); display: none; align-items: center;
            justify-content: center; z-index: 100; padding: 20px;
        }
        .modal {
            background: var(--card-bg); width: 100%; max-width: 600px;
            border-radius: 24px; border: 1px solid var(--border);
            padding: 30px; position: relative; animation: modalIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.9rem; color: var(--accent); }
        .question-text { font-family: 'Amiri', serif; font-size: 1.5rem; font-weight: 700; line-height: 1.6; margin-bottom: 25px; }

        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 15px 20px; border-radius: 12px; color: var(--fg);
            text-align: right; cursor: pointer; transition: 0.2s; font-size: 1.1rem;
        }
        .option-btn:hover { background: var(--accent-glow); border-color: var(--accent); }
        .option-btn.correct { background: var(--ok) !important; color: #fff; border-color: var(--ok); }
        .option-btn.wrong { background: var(--no) !important; color: #fff; border-color: var(--no); }

        .feedback {
            margin-top: 20px; padding: 15px; border-radius: 10px; display: none;
            font-size: 0.95rem; line-height: 1.6; animation: fadeIn 0.3s;
        }
        .feedback.show { display: block; }

        .btn-close-modal {
            margin-top: 20px; width: 100%; padding: 12px; border-radius: 10px;
            background: var(--accent); border: none; color: var(--bg);
            font-weight: 900; cursor: pointer; display: none;
        }

        /* شاشة النتائج */
        .results-screen { display: none; text-align: center; padding: 40px 20px; }
        .score-circle {
            width: 150px; height: 150px; border: 8px solid var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; margin: 0 auto 30px;
        }

        .btn-main {
            background: var(--accent); color: var(--bg); border: none;
            padding: 18px 50px; border-radius: 50px; font-size: 1.2rem;
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 10px 20px var(--accent-glow); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 600px) {
            .intro h1 { font-size: 2.5rem; }
            .cards-grid { grid-template-columns: repeat(3, 1fr); }
            .modal { padding: 20px; }
            .question-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="bg-decor"></div>

<div class="container">
    <section class="intro" id="introScreen">
        <i class="fas fa-mosque fa-4x" style="color: var(--accent); margin-bottom: 20px;"></i>
        <h1>معمارية الإيمان</h1>
        <p>مرحباً بك في مسابقة فكرية شاملة. اختر بطاقة من اللوحة للإجابة على 23 سؤالاً في أصول وفروع الدين والصلوات والجهاد.</p>
        <button class="btn-main" onclick="startApp()">ابدأ الرحلة</button>
    </section>

    <section class="board-container" id="boardScreen">
        <div class="stats-bar">
            <div class="stat-item">النتيجة: <span id="liveScore">0</span></div>
            <div class="stat-item">المتبقي: <span id="remainingCards">23</span></div>
        </div>
        <div class="cards-grid" id="cardsGrid">
            </div>
        <div style="text-align: center;">
            <button class="btn-main" id="finishBtn" style="display: none;" onclick="showFinalResults()">عرض النتيجة النهائية</button>
        </div>
    </section>

    <section class="results-screen" id="resultsScreen">
        <h2 style="font-family: 'Amiri'; font-size: 3rem; color: var(--accent);">اكتملت المسابقة</h2>
        <div class="score-circle" id="finalScoreCircle">0</div>
        <p id="resultMsg" style="margin-bottom: 30px; color: var(--muted); font-size: 1.2rem;"></p>
        <button class="btn-main" onclick="location.reload()">إعادة الاختبار</button>
    </section>
</div>

<div class="overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <span id="mCategory">القسم</span>
            <span id="mTimer"><i class="fas fa-clock"></i> 20</span>
        </div>
        <div class="question-text" id="mQuestion">نص السؤال يظهر هنا؟</div>
        <div class="options-list" id="mOptions">
            </div>
        <div class="feedback" id="mFeedback"></div>
        <button class="btn-close-modal" id="mCloseBtn" onclick="closeModal()">العودة للوحة البطاقات</button>
    </div>
</div>

<script>
const QUESTIONS = [
    {sec:"أصول الدين", q:"كم عدد أصول الدين عند الشيعة الإمامية؟", opts:["3 أصول","5 أصول","7 أصول","10 أصول"], c:1, exp:"أصول الدين هي: التوحيد، العدل، النبوة، الإمامة، المعاد."},
    {sec:"أصول الدين", q:"ما هو الأصل الذي يعني أن الله لا يظلم أحداً؟", opts:["التوحيد","النبوة","العدل","الإمامة"], c:2, exp:"العدل الإلهي يعني أن أفعاله سبحانه حكيمة ومنزهة عن العبث والظلم."},
    {sec:"أصول الدين", q:"أي من هذه الأمور يندرج تحت أصل 'المعاد'؟", opts:["الصلاة","البعث والحساب","العدل بين الناس","عصمة الأنبياء"], c:1, exp:"المعاد هو الإيمان بالحياة الآخرة والبعث بعد الموت للحساب."},
    {sec:"أصول الدين", q:"الإيمان بأن الله واحد لا شريك له هو أصل:", opts:["الإمامة","التوحيد","المعاد","العدل"], c:1, exp:"التوحيد هو أول أصول الدين وأساس العقيدة."},
    {sec:"أصول الدين", q:"النيابة عن النبي في حفظ الدين وتبليغه تسمى:", opts:["الخلافة","الإمامة","الولاية","الصحبة"], c:1, exp:"الإمامة هي منصب إلهي لاختيار من يخلف النبي في شؤون الدين والدنيا."},
    
    {sec:"فروع الدين", q:"كم عدد فروع الدين؟", opts:["5","8","10","12"], c:2, exp:"فروع الدين عشرة تشمل العبادات والواجبات الاجتماعية كالصلاة والخمس والجهاد."},
    {sec:"فروع الدين", q:"أي مما يلي من فروع الدين وليس أصوله؟", opts:["العدل","النبوة","الصلاة","التوحيد"], c:2, exp:"الصلاة عمل عبادي لذا هي فرع، أما البقية فمعتقدات قلبية (أصول)."},
    {sec:"فروع الدين", q:"ما معنى 'التبري' في فروع الدين؟", opts:["البراءة من أعداء الله","ترك الصلاة","البراءة من الذنوب","حب الصالحين"], c:0, exp:"التبري هو اتخاذ موقف العداء والبراءة من أعداء الإسلام وأعداء أهل البيت."},
    {sec:"فروع الدين", q:"دفع 'الخمس' يكون من:", opts:["الراتب الكلي","أرباح المكاسب الزائدة عن المؤونة","الذهب فقط","أموال الزكاة"], c:1, exp:"يُدفع الخمس من الفوائض المالية السنوية بعد استثناء مصاريف المعيشة (المؤونة)."},
    {sec:"فروع الدين", q:"'الأمر بالمعروف' هو:", opts:["دعوة الناس للخير","فرض الرأي","ترك المعاصي","السكوت عن الحق"], c:0, exp:"هو واجب اجتماعي يهدف لإرشاد الناس للطاعات والخيرات."},

    {sec:"الجهاد", q:"ما هو 'الجهاد الأكبر' كما وصفه النبي ﷺ؟", opts:["قتال المشركين","جهاد النفس","بناء المساجد","الإنفاق المالي"], c:1, exp:"الجهاد الأكبر هو محاربة الهوى والشهوات داخل النفس البشرية."},
    {sec:"الجهاد", q:"الجهاد الذي يهدف لصد العدوان عن بلاد المسلمين يسمى:", opts:["جهاداً ابتدائياً","جهاداً دفاعياً","جهاداً مالياً","جهاداً فكرياً"], c:1, exp:"الجهاد الدفاعي واجب على كل قادر عندما يتعرض المسلمون للخطر."},
    {sec:"الجهاد", q:"من شروط الجهاد القتالي الابتدائي وجود:", opts:["المال الوفير","إذن المعصوم أو نائبه","الأسلحة المتطورة","العدد الكبير"], c:1, exp:"الجهاد الابتدائي يتطلب إذناً شرعياً خاصاً من الإمام أو من ينوب عنه."},
    {sec:"الجهاد", q:"هل يُعتبر الإنفاق المالي لتجهيز المقاتلين جهاداً؟", opts:["لا، الجهاد بالسيف فقط","نعم، هو جهاد بالمال","فقط إذا كان المقاتل فقيراً","لا يُعتبر عبادة"], c:1, exp:"القرآن قرن الجهاد بالنفس والمال في آيات كثيرة."},

    {sec:"الصلوات اليومية", q:"كم عدد الصلوات الواجبة في اليوم والليلة؟", opts:["3","5","7","17"], c:1, exp:"الصلوات الخمس: الصبح، الظهر، العصر، المغرب، العشاء."},
    {sec:"الصلوات اليومية", q:"أي صلاة يبدأ وقتها من 'الزوال'؟", opts:["الفجر","المغرب","الظهر","العشاء"], c:2, exp:"وقت الظهر يبدأ من ميل الشمس عن كبد السماء (الزوال)."},
    {sec:"الصلوات اليومية", q:"أي من الأفعال التالية من أركان الصلاة (تبطل بتركها سهواً)؟", opts:["القراءة","التشهد","الركوع","الذكر"], c:2, exp:"الأركان خمسة: النية، التكبير، القيام، الركوع، السجدتان."},
    {sec:"الصلوات اليومية", q:"صلاة المغرب تجب عند:", opts:["غروب الشمس","ذهاب الحمرة المشرقية","منتصف الليل","العصر"], c:1, exp:"المشهور عند الشيعة وجوب انتظار ذهاب الحمرة التي تظهر في الشرق بعد الغروب."},
    {sec:"الصلوات اليومية", q:"ما حكم من ترك سجدة واحدة وتذكرها بعد السلام؟", opts:["تبطل صلاته","يأتي بها ويقضيها مع سجود السهو","لا شيء عليه","يعيد الصلاة"], c:1, exp:"السجدة الواحدة ليست ركناً، فيقضيها المصلي ويسجد للسهو."},

    {sec:"عدد الركعات", q:"كم عدد ركعات صلاة الصبح؟", opts:["ركعة","ركعتان","3 ركعات","4 ركعات"], c:1, exp:"صلاة الصبح ركعتان جهريتان."},
    {sec:"عدد الركعات", q:"الصلاة الوحيدة التي تتكون من 3 ركعات هي:", opts:["الظهر","العصر","المغرب","العشاء"], c:2, exp:"صلاة المغرب ثلاث ركعات دائماً سواء في الحضر أو السفر."},
    {sec:"عدد الركعات", q:"مجموع الركعات المفروضة في اليوم (للمقيم) هو:", opts:["11 ركعة","15 ركعة","17 ركعة","20 ركعة"], c:2, exp:"2 للصبح + 4 للظهر + 4 للعصر + 3 للمغرب + 4 للعشاء = 17 ركعة."},
    {sec:"عدد الركعات", q:"في حالة السفر، الصلاة التي لا تُقصر (تبقى كما هي) هي:", opts:["الظهر","العشاء","المغرب","العصر"], c:2, exp:"المغرب والصبح لا قصر فيهما، القصر يلحق الرباعيات فقط."}
];

let score = 0;
let answeredCount = 0;
let currentQIdx = null;
let timerInterval = null;

// تشغيل التطبيق
function startApp() {
    document.getElementById('introScreen').style.display = 'none';
    document.getElementById('boardScreen').style.display = 'block';
    createBoard();
}

// إنشاء لوحة البطاقات
function createBoard() {
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';
    QUESTIONS.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `card-${index}`;
        card.onclick = () => openQuestion(index);
        
        let icon = 'fa-star';
        if(q.sec === "أصول الدين") icon = 'fa-seedling';
        if(q.sec === "فروع الدين") icon = 'fa-code-branch';
        if(q.sec === "الصلوات اليومية") icon = 'fa-hands-praying';
        
        card.innerHTML = `
            <i class="fas ${icon}"></i>
            <span>${index + 1}</span>
        `;
        grid.appendChild(card);
    });
}

// فتح السؤال
function openQuestion(idx) {
    currentQIdx = idx;
    const q = QUESTIONS[idx];
    
    document.getElementById('mCategory').innerText = q.sec;
    document.getElementById('mQuestion').innerText = q.q;
    document.getElementById('mFeedback').classList.remove('show');
    document.getElementById('mCloseBtn').style.display = 'none';
    
    const optsContainer = document.getElementById('mOptions');
    optsContainer.innerHTML = '';
    q.opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(i);
        optsContainer.appendChild(btn);
    });

    document.getElementById('modalOverlay').style.display = 'flex';
    startTimer(20);
}

// مؤقت السؤال
function startTimer(seconds) {
    let timeLeft = seconds;
    const timerEl = document.getElementById('mTimer');
    clearInterval(timerInterval);
    
    timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.innerHTML = `<i class="fas fa-clock"></i> ${timeLeft}`;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            checkAnswer(-1); // الوقت انتهى
        }
    }, 1000);
}

// فحص الإجابة
function checkAnswer(selectedIdx) {
    clearInterval(timerInterval);
    const q = QUESTIONS[currentQIdx];
    const isCorrect = selectedIdx === q.c;
    const btns = document.querySelectorAll('.option-btn');
    const card = document.getElementById(`card-${currentQIdx}`);
    
    // تعطيل الخيارات
    btns.forEach(btn => btn.style.pointerEvents = 'none');
    
    if (selectedIdx !== -1) {
        if (isCorrect) {
            btns[selectedIdx].classList.add('correct');
            score += 10;
            card.classList.add('done-ok');
        } else {
            btns[selectedIdx].classList.add('wrong');
            btns[q.c].classList.add('correct');
            card.classList.add('done-no');
        }
    } else {
        btns[q.c].classList.add('correct');
        card.classList.add('done-no');
    }

    card.classList.add('disabled');
    card.onclick = null; // منع إعادة النقر

    // إظهار التفسير
    const feedback = document.getElementById('mFeedback');
    feedback.innerHTML = `<strong>${isCorrect ? 'إجابة صحيحة!' : 'إجابة خاطئة!'}</strong><br>${q.exp}`;
    feedback.className = `feedback show ${isCorrect ? 'ok' : 'no'}`;
    feedback.style.color = isCorrect ? 'var(--ok)' : 'var(--no)';
    
    document.getElementById('mCloseBtn').style.display = 'block';
    
    // تحديث الإحصائيات
    answeredCount++;
    document.getElementById('liveScore').innerText = score;
    document.getElementById('remainingCards').innerText = 23 - answeredCount;

    if (answeredCount === 23) {
        document.getElementById('finishBtn').style.display = 'inline-block';
    }
}

// إغلاق المودال
function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
}

// النتائج النهائية
function showFinalResults() {
    document.getElementById('boardScreen').style.display = 'none';
    document.getElementById('resultsScreen').style.display = 'block';
    
    document.getElementById('finalScoreCircle').innerText = score;
    
    const msg = document.getElementById('resultMsg');
    const pct = (score / 230) * 100;
    
    if (pct >= 90) msg.innerText = "ما شاء الله! معرفة عميقة وراسخة بأصول الدين وفروعه.";
    else if (pct >= 70) msg.innerText = "أداء ممتاز، لديك ثقافة دينية واعية جداً.";
    else if (pct >= 50) msg.innerText = "نتيجة جيدة، وتحتاج لمزيد من التعمق في بعض المسائل.";
    else msg.innerText = "فرصة جيدة لزيادة حصيلتك المعرفية في أصول الدين وفروعه.";
}
</script>

</body>
</html>
